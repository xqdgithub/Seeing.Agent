              - paragraph [ref=e831]: 根据多家媒体（包括中华网、中央社、自由时报、经济日报等）的报道，2025年12月29日，中国人民解放军东部战区在台湾周边举行了名为“正义使命-2025”的联合军事演习。此次演习具有以下关键要点：
              - heading "1. 演习区域与范围" [level=3] [ref=e832]:
                - text: "1."
                - strong [ref=e833]: 演习区域与范围
              - list [ref=e834]:
                - listitem [ref=e835]:
                  - text: 解放军划设了
                  - strong [ref=e836]: 5个主要演习区域
                  - text: ，分别位于：
                  - list [ref=e837]:
                    - listitem [ref=e838]: 台湾海峡
                    - listitem [ref=e839]: 台岛北部
                    - listitem [ref=e840]: 台岛西南
                    - listitem [ref=e841]: 台岛东南
                    - listitem [ref=e842]: 台岛以东
                - listitem [ref=e843]:
                  - text: 台湾“国防部”晚间召开记者会证实，
                  - strong [ref=e844]: 这5个演习区域均划入了台湾所称的“12海里领海线”范围内
                  - text: ，部分区域甚至贴近或进入“领海基线”。
                - listitem [ref=e845]:
                  - text: 台军还发现解放军在东部海域增设了
                  - strong [ref=e846]: 第8个演习区
                  - text: 。
                - listitem [ref=e847]:
                  - text: 有报道指出，演习区域距台岛最近处仅
                  - strong [ref=e848]: 4.7海里
                  - text: ，为“史上最靠近台湾岛的一次军演”。
              - heading "2. 参演兵力" [level=3] [ref=e849]:
                - text: "2."
                - strong [ref=e850]: 参演兵力
              - list [ref=e851]:
                - listitem [ref=e852]:
                  - strong [ref=e853]: 海空力量联合行动
