                - listitem [ref=e854]: 海上兵力：共舰14艘、海警船14艘（部分来自北部海域，最近距台21海里）。
                - listitem [ref=e855]:
                  - text: 空中兵力：截至当日15时，共侦获军机及无人机
                  - strong [ref=e856]: 89架次
                  - text: ，其中67架次进入台方“应变区”。
                - listitem [ref=e857]:
                  - text: 台军掌握到
                  - strong [ref=e858]: 075级两栖突击舰4艘
                  - text: 在台东南外海驻守；台方确认大陆3艘航母
                  - strong [ref=e859]: 未参与本次军演
                  - text: 。
                - listitem [ref=e860]: 海巡署部署14艘舰艇，采取“1对1对峙、监控、驱离”方式应对海警船。
