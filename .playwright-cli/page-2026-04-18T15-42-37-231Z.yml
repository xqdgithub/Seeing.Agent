              - list [ref=e1010]:
                - listitem [ref=e1011]: 2023年12月18日，刘威安排两名辅警取件时被现场布控的禁毒侦查人员控制
                - listitem [ref=e1012]: 从包裹中提取并扣押疑似大麻植株4袋，共计160.25克
                - listitem [ref=e1013]: 12月21日，根据刘威交代，又扣押另一包裹中的24袋大麻，共计1352.09克
                - listitem [ref=e1014]:
                  - strong [ref=e1015]: 总计查获1512.34克大麻
