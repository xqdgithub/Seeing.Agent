            - generic [ref=e460]:
              - paragraph [ref=e461]: 根据多家媒体（包括中华网、中央社、自由时报、经济日报等）的报道，2025年12月29日，中国人民解放军东部战区在台湾周边举行了名为“正义使命-2025”的联合军事演习。此次演习具有以下关键要点：
              - heading "1. 演习区域与范围" [level=3] [ref=e462]:
                - text: "1."
                - strong [ref=e463]: 演习区域与范围
              - list [ref=e464]:
                - listitem [ref=e465]:
                  - text: 解放军划设了
                  - strong [ref=e466]: 5个主要演习区域
                  - text: ，分别位于：
                  - list [ref=e467]:
                    - listitem [ref=e468]: 台湾海峡
                    - listitem [ref=e469]: 台岛北部
                    - listitem [ref=e470]: 台岛西南
                    - listitem [ref=e471]: 台岛东南
                    - listitem [ref=e472]: 台岛以东
                - listitem [ref=e473]:
                  - text: 台湾“国防部”晚间召开记者会证实，
                  - strong [ref=e474]: 这5个演习区域均划入了台湾所称的“12海里领海线”范围内
                  - text: ，部分区域甚至贴近或进入“领海基线”。
                - listitem [ref=e475]:
                  - text: 台军还发现解放军在东部海域增设了
                  - strong [ref=e476]: 第8个演习区
                  - text: 。
                - listitem [ref=e477]:
                  - text: 有报道指出，演习区域距台岛最近处仅
                  - strong [ref=e478]: 4.7海里
                  - text: ，为“史上最靠近台湾岛的一次军演”。
              - heading "2. 参演兵力" [level=3] [ref=e479]:
                - text: "2."
                - strong [ref=e480]: 参演兵力
              - list [ref=e481]:
                - listitem [ref=e482]:
                  - strong [ref=e483]: 海空力量联合行动
                  - text: ：包括陆军、海军、空军及火箭军等多军种协同。
                - listitem [ref=e484]: 海上兵力：共舰14艘、海警船14艘（部分来自北部海域，最近距台21海里）。
                - listitem [ref=e485]:
                  - text: 空中兵力：截至当日15时，共侦获军机及无人机
                  - strong [ref=e486]: 89架次
                  - text: ，其中67架次进入台方“应变区”。
                - listitem [ref=e487]:
                  - text: 台军掌握到
                  - strong [ref=e488]: 075级两栖突击舰4艘
                  - text: 在台东南外海驻守；台方确认大陆3艘航母
                  - strong [ref=e489]: 未参与本次军演
                  - text: 。
                - listitem [ref=e490]: 海巡署部署14艘舰艇，采取“1对1对峙、监控、驱离”方式应对海警船。
