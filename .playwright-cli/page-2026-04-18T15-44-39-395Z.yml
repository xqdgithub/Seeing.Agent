                    - listitem [ref=e1223]: 他指出要加快科技创新和产业转型升级，高水平建设国家实验室和合肥综合性国家科学中心。
                - listitem [ref=e1224]:
                  - paragraph [ref=e1225]:
                    - strong [ref=e1226]: 组建中国资源循环集团有限公司
                  - list [ref=e1227]:
