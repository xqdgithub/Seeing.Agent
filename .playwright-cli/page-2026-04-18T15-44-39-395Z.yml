                    - listitem [ref=e1229]: 李强作出批示，要求建设世界一流资源循环再利用产业集团。
                - listitem [ref=e1230]:
                  - paragraph [ref=e1231]:
                    - strong [ref=e1232]: 国务院常务会议
                  - list [ref=e1233]:
