            - generic [ref=e1329]:
              - paragraph [ref=e1330]: 根据多家媒体（包括中华网、中央社、自由时报、经济日报等）的报道，2025年12月29日，中国人民解放军东部战区在台湾周边举行了名为“正义使命-2025”的联合军事演习。此次演习具有以下关键要点：
              - heading "1. 演习区域与范围" [level=3] [ref=e1331]:
                - text: "1."
                - strong [ref=e1332]: 演习区域与范围
              - list [ref=e1333]:
                - listitem [ref=e1334]:
                  - text: 解放军划设了
                  - strong [ref=e1335]: 5个主要演习区域
                  - text: ，分别位于：
                  - list [ref=e1336]:
                    - listitem [ref=e1337]: 台湾海峡
                    - listitem [ref=e1338]: 台岛北部
                    - listitem [ref=e1339]: 台岛西南
                    - listitem [ref=e1340]: 台岛东南
                    - listitem [ref=e1341]: 台岛以东
                - listitem [ref=e1342]:
                  - text: 台湾“国防部”晚间召开记者会证实，
                  - strong [ref=e1343]: 这5个演习区域均划入了台湾所称的“12海里领海线”范围内
                  - text: ，部分区域甚至贴近或进入“领海基线”。
                - listitem [ref=e1344]:
                  - text: 台军还发现解放军在东部海域增设了
                  - strong [ref=e1345]: 第8个演习区
                  - text: 。
                - listitem [ref=e1346]:
                  - text: 有报道指出，演习区域距台岛最近处仅
                  - strong [ref=e1347]: 4.7海里
                  - text: ，为“史上最靠近台湾岛的一次军演”。
              - heading "2. 参演兵力" [level=3] [ref=e1348]:
                - text: "2."
                - strong [ref=e1349]: 参演兵力
              - list [ref=e1350]:
                - listitem [ref=e1351]:
                  - strong [ref=e1352]: 海空力量联合行动
                  - text: ：包括陆军、海军、空军及火箭军等多军种协同。
                - listitem [ref=e1353]: 海上兵力：共舰14艘、海警船14艘（部分来自北部海域，最近距台21海里）。
                - listitem [ref=e1354]:
                  - text: 空中兵力：截至当日15时，共侦获军机及无人机
                  - strong [ref=e1355]: 89架次
                  - text: ，其中67架次进入台方“应变区”。
                - listitem [ref=e1356]:
                  - text: 台军掌握到
                  - strong [ref=e1357]: 075级两栖突击舰4艘
                  - text: 在台东南外海驻守；台方确认大陆3艘航母
